<!doctype html>
<html>
  <head>
    <title>Edit Contract</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow p-4">
            <h2 class="mb-4">Update Contract</h2>

            <form action="/update_contract/{{ contract[0] }}" method="POST">
              <input
                type="text"
                name="title"
                class="form-control mb-3"
                value="{{ contract[1] }}"
                required
              />

              <input
                type="text"
                name="client"
                class="form-control mb-3"
                value="{{ contract[2] }}"
                required
              />

              <input
                type="number"
                name="amount"
                class="form-control mb-3"
                value="{{ contract[3] }}"
                required
              />

              <label> Start Date </label>

              <input
                type="date"
                name="start"
                class="form-control mb-3"
                value="{{ contract[4] }}"
                required
              />

              <label> End Date </label>

              <input
                type="date"
                name="end"
                class="form-control mb-3"
                value="{{ contract[5] }}"
                required
              />

              <select name="status" class="form-control mb-3">
                <option {% if contract[6]="" ="Pending" %} selected {% endif %}>
                  Pending
                </option>

                <option
                  {%
                  if
                  contract[6]=""
                  ="Approved"
                  %}
                  selected
                  {%
                  endif
                  %}
                >
                  Approved
                </option>

                <option
                  {%
                  if
                  contract[6]=""
                  ="Rejected"
                  %}
                  selected
                  {%
                  endif
                  %}
                >
                  Rejected
                </option>
              </select>

              <button class="btn btn-success w-100">Update Contract</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
